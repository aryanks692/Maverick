<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Triage Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .leaflet-transparent-icon { background: transparent; border: none; }
        
        .pulse-dot { width: 22px; height: 22px; background-color: #ef4444; border-radius: 50%; animation: pulseAnim 1.5s infinite; }
        .standard-dot { width: 15px; height: 15px; border-radius: 50%; border: 2.5px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.6); }

        @keyframes pulseAnim {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); }
            70% { transform: scale(1.6); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .tab-active { border-bottom: 3px solid #f97316; color: white; background: #374151; }

        .tracking-line { stroke-dasharray: 10, 20; animation: moveRoute 1s linear infinite; }
        @keyframes moveRoute { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
        
        .card-highlighted {
            opacity: 1 !important; transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); border: 2px solid white !important; z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans flex overflow-hidden">

    <div class="w-1/3 h-screen bg-gray-800 border-r border-gray-700 flex flex-col z-10 relative shadow-2xl">
        
        <div class="p-5 bg-gray-900 shadow-lg border-b border-gray-700">
            <h1 class="text-3xl font-bold text-red-500 tracking-wider italic">OMNI-TRIAGE</h1>
            <div class="flex items-center justify-between mt-1">
                <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em] font-black">Dynamic Tracking Active</p>
                <span id="api-status" class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-gray-300">Checking DB...</span>
            </div>
        </div>

        <div class="flex bg-gray-900 text-gray-400 text-[10px] font-black uppercase tracking-widest border-b border-gray-700 shrink-0">
            <button onclick="switchTab('pending')" id="tab-pending" class="flex-1 py-4 transition-all tab-active">
                Pending <span id="count-pending" class="ml-1 bg-red-600 text-white px-2 py-0.5 rounded-full shadow-[0_0_8px_rgba(220,38,38,0.6)]">0</span>
            </button>
            <button onclick="switchTab('dispatched')" id="tab-dispatched" class="flex-1 py-4 transition-all">
                En Route <span id="count-dispatched" class="ml-1 bg-orange-600 text-white px-2 py-0.5 rounded-full shadow-[0_0_8px_rgba(234,88,12,0.6)]">0</span>
            </button>
            <button onclick="switchTab('reached')" id="tab-reached" class="flex-1 py-4 transition-all">
                On-Site <span id="count-reached" class="ml-1 bg-green-600 text-white px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>

        <div id="case-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-800">
            <p id="init-text" class="text-gray-500 text-center mt-10 italic animate-pulse">Waiting for satellite sync...</p>
        </div>

        <div class="h-40 bg-black border-t border-gray-700 p-3 shrink-0 flex flex-col shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-20">
            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-2 border-b border-gray-800 pb-1 flex justify-between">
                <span>System Audit Log</span>
                <span class="text-green-500 animate-pulse">● REC</span>
            </div>
            <div id="log-list" class="space-y-1.5 text-[9px] font-mono flex-1 overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <div class="w-2/3 h-screen relative">
        <div id="map"></div>
        
        <div class="absolute bottom-6 right-6 z-[1000] bg-gray-900/90 backdrop-blur-md border border-gray-700 p-3 rounded-lg shadow-2xl text-[10px] font-bold text-gray-300">
            <div class="mb-2 uppercase tracking-widest text-gray-500 border-b border-gray-700 pb-1">Legend</div>
            <div class="flex items-center gap-2 mt-1.5"><span class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_5px_red]"></span> CRITICAL (Priority 1)</div>
            <div class="flex items-center gap-2 mt-1.5"><span class="w-3 h-3 rounded-full bg-orange-500 border border-white"></span> HIGH (Priority 2)</div>
            <div class="flex items-center gap-2 mt-1.5"><span class="w-3 h-3 rounded-full bg-blue-500 border border-white"></span> MEDIUM (Priority 3)</div>
            <div class="flex items-center gap-2 mt-2 pt-2 border-t border-gray-700"><span class="text-lg">🚑</span> Active Unit</div>
            <div class="flex items-center gap-2 mt-1"><span class="w-4 h-1 bg-yellow-500 border-t border-dashed border-black"></span> Predicted Route</div>
            <div class="flex items-center gap-2 mt-1"><span class="w-4 h-1 bg-green-500 border-t border-dashed border-black"></span> Active Route</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000'; 
        const map = L.map('map').setView([12.9716, 77.5946], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        map.on('click', () => {
            document.querySelectorAll('.case-card').forEach(el => { el.style.opacity = '1'; el.classList.remove('card-highlighted'); });
            for(let id in activePolylines) { map.removeLayer(activePolylines[id]); } activePolylines = {};
        });

        let globalCases = []; 
        let currentTab = 'pending';
        let isFirstLoad = true;
        let systemLogs = []; // Stores the audit logs
        
        const activeMarkers = {}; 
        const stationMarkers = {}; 
        let activePolylines = {}; 
        const vehicleMarkers = {}; 
        const startedSimulations = new Set();
        const simulationState = {};

        let STATIONS = [
            { id: 1, name: "Central HQ", lat: 12.971, lng: 77.594, fire: 5, med: 8, police: 6, heli: 5 },
            { id: 2, name: "Indiranagar", lat: 12.978, lng: 77.640, fire: 2, med: 3, police: 4, heli: 0 },
            { id: 3, name: "Whitefield", lat: 12.969, lng: 77.749, fire: 3, med: 4, police: 3, heli: 0 },
            { id: 4, name: "Koramangala", lat: 12.927, lng: 77.627, fire: 3, med: 5, police: 5, heli: 0 },
            { id: 5, name: "HSR Layout", lat: 12.912, lng: 77.644, fire: 2, med: 3, police: 3, heli: 0 },
            { id: 6, name: "JP Nagar", lat: 12.906, lng: 77.585, fire: 2, med: 3, police: 3, heli: 0 },
            { id: 7, name: "Arekere", lat: 12.885, lng: 77.596, fire: 1, med: 2, police: 2, heli: 0 },
            { id: 8, name: "Bommanahalli", lat: 12.902, lng: 77.624, fire: 2, med: 3, police: 3, heli: 0 },
            { id: 9, name: "Peenya", lat: 13.028, lng: 77.519, fire: 3, med: 3, police: 4, heli: 0 },
            { id: 10, name: "RR Nagar", lat: 12.927, lng: 77.515, fire: 2, med: 3, police: 2, heli: 0 },
            { id: 11, name: "Nagarabhavi", lat: 12.954, lng: 77.511, fire: 2, med: 2, police: 2, heli: 0 },
            { id: 12, name: "Banashankari", lat: 12.925, lng: 77.546, fire: 2, med: 4, police: 3, heli: 0 },
            { id: 13, name: "Yelahanka", lat: 13.100, lng: 77.596, fire: 2, med: 3, police: 3, heli: 0 },
            { id: 14, name: "E-City", lat: 12.839, lng: 77.677, fire: 3, med: 4, police: 3, heli: 0 },
            { id: 15, name: "Jayanagar", lat: 12.929, lng: 77.582, fire: 2, med: 4, police: 3, heli: 0 },
            { id: 16, name: "Malleswaram", lat: 13.003, lng: 77.564, fire: 2, med: 3, police: 4, heli: 0 },
            { id: 17, name: "Hebbal Hub", lat: 13.035, lng: 77.598, fire: 3, med: 3, police: 3, heli: 0 },
            { id: 18, name: "KR Puram", lat: 13.007, lng: 77.695, fire: 2, med: 4, police: 2, heli: 0 },
            { id: 19, name: "Konanakunte", lat: 12.884, lng: 77.570, fire: 1, med: 2, police: 2, heli: 0 },
            { id: 20, name: "Marathahalli", lat: 12.956, lng: 77.701, fire: 3, med: 4, police: 3, heli: 0 },
            { id: 21, name: "Rajajinagar", lat: 12.990, lng: 77.553, fire: 2, med: 3, police: 4, heli: 0 }
        ];

        // --- NEW: AUDIT LOG SYSTEM ---
        function addLog(msg, type = "info") {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
            systemLogs.push({ time, msg, type });
            if (systemLogs.length > 30) systemLogs.shift();
            
            const logBox = document.getElementById('log-list');
            if(!logBox) return;
            logBox.innerHTML = systemLogs.map(l => {
                let colorClass = 'text-gray-400';
                if (l.type === 'alert') colorClass = 'text-red-400 font-bold';
                if (l.type === 'dispatch') colorClass = 'text-blue-400';
                if (l.type === 'success') colorClass = 'text-green-400';
                return `<div class="${colorClass} leading-tight"><span class="text-gray-600">[${l.time}]</span> ${l.msg}</div>`;
            }).join('');
            logBox.scrollTop = logBox.scrollHeight;
        }

        function getSeverityColor(sev) { if (sev === 'CRITICAL') return '#ef4444'; if (sev === 'HIGH') return '#f97316'; return '#3b82f6'; }
        function getSeverityWeight(sev) { if (sev === 'CRITICAL') return 4; if (sev === 'HIGH') return 3; if (sev === 'MEDIUM') return 2; return 1; }

        function analyzeSignals(rawText, severity) {
            const text = rawText ? rawText.toLowerCase() : "";
            const recommendations = [];
            let needsFire = ['fire', 'burns', 'smoke', 'trapped'].some(kw => text.includes(kw));
            let needsMed = ['bleeding', 'breathing', 'unconscious', 'fracture'].some(kw => text.includes(kw));
            let needsPolice = ['accident', 'fight', 'weapon'].some(kw => text.includes(kw));
            if (!needsFire && !needsMed && !needsPolice) needsPolice = true;

            if (needsFire) recommendations.push({ type: 'FIRE', btnClass: 'bg-red-700 border-red-500', icon: '🚒', label: 'FIRE DEPT' });
            if (needsMed) recommendations.push({ type: 'MED', btnClass: 'bg-blue-700 border-blue-500', icon: '🚑', label: 'AMBULANCE' });
            if (needsPolice) recommendations.push({ type: 'POLICE', btnClass: 'bg-gray-700 border-gray-500', icon: '🚓', label: 'POLICE' });
            if (severity === 'CRITICAL' || text.includes('airlift')) recommendations.push({ type: 'HELI', btnClass: 'bg-purple-700 border-purple-500', icon: '🚁', label: 'HELI-VAC' });

            return recommendations;
        }

        async function fetchRouteData(originLat, originLng, destLat, destLng, unitType) {
            if (unitType === 'HELI') return [{lat: originLat, lng: originLng}, {lat: destLat, lng: destLng}];
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${originLng},${originLat};${destLng},${destLat}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.routes && data.routes[0]) {
                    return data.routes[0].geometry.coordinates.map(c => ({lat: c[1], lng: c[0]}));
                }
            } catch (error) { console.warn("OSRM Routing failed."); }
            return [{lat: originLat, lng: originLng}, {lat: destLat, lng: destLng}];
        }

        function getInterpolatedPoint(latlngs, progress) {
            if (!latlngs || latlngs.length === 0) return null;
            if (progress <= 0) return latlngs[0];
            if (progress >= 1) return latlngs[latlngs.length - 1];

            let totalDist = 0; let segments = [];
            for (let i = 0; i < latlngs.length - 1; i++) {
                let d = Math.sqrt(Math.pow(latlngs[i+1].lat - latlngs[i].lat, 2) + Math.pow(latlngs[i+1].lng - latlngs[i].lng, 2));
                totalDist += d; segments.push(d);
            }
            let targetDist = totalDist * progress; let currentDist = 0;
            for (let i = 0; i < segments.length; i++) {
                if (currentDist + segments[i] >= targetDist) {
                    let segmentProgress = (targetDist - currentDist) / segments[i];
                    return { lat: latlngs[i].lat + (latlngs[i+1].lat - latlngs[i].lat) * segmentProgress, lng: latlngs[i].lng + (latlngs[i+1].lng - latlngs[i].lng) * segmentProgress };
                }
                currentDist += segments[i];
            }
            return latlngs[latlngs.length - 1];
        }

        function createVehicleMarker(c) {
            if(vehicleMarkers[c.case_id]) map.removeLayer(vehicleMarkers[c.case_id]);
            
            let iconHtml = c.unit === 'HELI' ? '🚁' : (c.unit === 'FIRE' ? '🚒' : (c.unit === 'POLICE' ? '🚓' : '🚑'));
            let colorStr = c.unit === 'HELI' ? 'a855f7' : '22c55e';

            let icon = L.divIcon({
                className: 'leaflet-transparent-icon',
                html: `<div class="bg-gray-900 border-2 border-green-500 rounded-full w-8 h-8 flex items-center justify-center text-lg shadow-[0_0_15px_#${colorStr}] transform transition-all z-50">${iconHtml}</div>`,
                iconSize: [32, 32], iconAnchor: [16, 16]
            });

            let marker = L.marker([c.origin_lat, c.origin_lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
            marker.bindPopup(`<div class="font-bold text-gray-900 text-xs">Unit: ${c.unit}<br>Case: ${c.case_id}<br>ETA: <span id="popup-eta-${c.case_id}">--:--</span></div>`);
            marker.on('click', () => { highlightSidebarCard(c.case_id); });
            vehicleMarkers[c.case_id] = marker;
        }

        // --- DISPATCH LOGIC ---
        async function handleDispatch(id, type, lat, lng) {
            const currentCase = globalCases.find(x => x.case_id === id);
            if (!currentCase) return;

            let stationsByDistance = STATIONS.map(s => ({ ...s, dist: Math.pow(s.lat - lat, 2) + Math.pow(s.lng - lng, 2) })).sort((a, b) => a.dist - b.dist);
            let allocatedStation = null;
            let isSecondaryChoice = false;

            if (type === 'HELI') {
                let hq = STATIONS.find(s => s.id === 1);
                if (hq && hq.heli > 0) allocatedStation = hq;
            } else {
                if (stationsByDistance[0][type.toLowerCase()] > 0) { allocatedStation = STATIONS.find(s => s.id === stationsByDistance[0].id); } 
                else if (stationsByDistance[1] && stationsByDistance[1][type.toLowerCase()] > 0) { allocatedStation = STATIONS.find(s => s.id === stationsByDistance[1].id); isSecondaryChoice = true; }
            }

            if (allocatedStation) {
                allocatedStation[type.toLowerCase()]--;
                currentCase.status = 'dispatched';
                currentCase.unit = type;
                currentCase.origin = allocatedStation.name;
                currentCase.origin_lat = allocatedStation.lat; 
                currentCase.origin_lng = allocatedStation.lng;
                currentCase.diverted = false; 
                currentCase.totalEta = isSecondaryChoice ? 240 : 120; 
                currentCase.currentEta = currentCase.totalEta;
                
                currentCase.routePath = await fetchRouteData(allocatedStation.lat, allocatedStation.lng, lat, lng, type);
                createVehicleMarker(currentCase);
                for(let pid in activePolylines) { map.removeLayer(activePolylines[pid]); } activePolylines = {};
                
                // ADD LOG
                addLog(`[DISPATCH] ${type} assigned to ${currentCase.case_id} from ${allocatedStation.name}.`, "dispatch");
                
                renderDashboard();
                return;
            }

            // PREEMPTION (Steal)
            const currentWeight = getSeverityWeight(currentCase.severity || currentCase.processed?.severity);
            let victimCase = null;
            for (let i = 0; i < globalCases.length; i++) {
                const pc = globalCases[i];
                if (pc.status === 'dispatched' && pc.unit === type && getSeverityWeight(pc.severity || pc.processed?.severity) < currentWeight) { victimCase = pc; break; }
            }

            if (victimCase) {
                if (activePolylines[victimCase.case_id]) { map.removeLayer(activePolylines[victimCase.case_id]); delete activePolylines[victimCase.case_id]; }
                if (vehicleMarkers[victimCase.case_id]) { map.removeLayer(vehicleMarkers[victimCase.case_id]); delete vehicleMarkers[victimCase.case_id]; }

                currentCase.status = 'dispatched'; currentCase.unit = type;
                currentCase.origin = `${victimCase.origin} (MID-ROUTE DIVERT)`;
                currentCase.origin_lat = victimCase.origin_lat; currentCase.origin_lng = victimCase.origin_lng;
                currentCase.diverted = false; currentCase.totalEta = 180; currentCase.currentEta = 180;
                
                currentCase.routePath = await fetchRouteData(currentCase.origin_lat, currentCase.origin_lng, lat, lng, type);
                createVehicleMarker(currentCase);

                // ADD LOG
                addLog(`[⚠️ REALLOCATION] ${type} DIVERTED from ${victimCase.case_id} to ${currentCase.case_id} (CRITICAL).`, "alert");

                victimCase.status = 'pending'; victimCase.unit = null; victimCase.diverted = true;

                let victimStationsByDist = STATIONS.map(s => ({ ...s, dist: Math.pow(s.lat - (victimCase.location?.lat || 12.9716), 2) + Math.pow(s.lng - (victimCase.location?.lng || 77.5946), 2) })).sort((a, b) => a.dist - b.dist);
                let backupStation = null;
                if (victimStationsByDist[0][type.toLowerCase()] > 0) backupStation = STATIONS.find(s => s.id === victimStationsByDist[0].id);
                else if (victimStationsByDist[1] && victimStationsByDist[1][type.toLowerCase()] > 0) backupStation = STATIONS.find(s => s.id === victimStationsByDist[1].id);

                if(backupStation) {
                    backupStation[type.toLowerCase()]--;
                    victimCase.status = 'dispatched'; victimCase.unit = type;
                    victimCase.origin = `${backupStation.name} (BACKUP RE-ROUTED)`;
                    victimCase.origin_lat = backupStation.lat; victimCase.origin_lng = backupStation.lng;
                    victimCase.diverted = false; victimCase.totalEta = 300; victimCase.currentEta = 300;
                    victimCase.routePath = await fetchRouteData(backupStation.lat, backupStation.lng, (victimCase.location?.lat || 12.9716), (victimCase.location?.lng || 77.5946), type);
                    createVehicleMarker(victimCase);
                    
                    addLog(`[BACKUP] ${type} re-routed to ${victimCase.case_id} from ${backupStation.name}.`, "dispatch");
                }

                for(let pid in activePolylines) { map.removeLayer(activePolylines[pid]); } activePolylines = {};
                renderDashboard();
            } else {
                addLog(`[FAILED] No ${type} units available for ${currentCase.case_id}. Central Reserve empty.`, "alert");
            }
        }

        async function highlightSidebarCard(caseId) {
            for(let id in activePolylines) { map.removeLayer(activePolylines[id]); } activePolylines = {};
            document.querySelectorAll('.case-card').forEach(el => { el.style.opacity = '0.4'; el.classList.remove('card-highlighted'); });

            const c = globalCases.find(x => x.case_id === caseId);
            if (!c) return;

            if (currentTab !== c.status) switchTab(c.status);
            
            setTimeout(async () => {
                const card = document.getElementById(`card-${caseId}`);
                if (card) { card.classList.add('card-highlighted'); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                
                if (c.status === 'pending') {
                    let targetUnit = analyzeSignals(c.input.raw_text, c.severity || c.processed?.severity)[0]?.type || 'MED';
                    let stationsByDistance = STATIONS.map(s => ({ ...s, dist: Math.pow(s.lat - (c.location?.lat || 12.9716), 2) + Math.pow(s.lng - (c.location?.lng || 77.5946), 2) })).sort((a,b) => a.dist - b.dist);
                    let nearest = stationsByDistance.find(s => s[targetUnit.toLowerCase()] > 0) || stationsByDistance[0];
                    let predictedPath = await fetchRouteData(
                                                            nearest.lat,
                                                            nearest.lng,
                                                            (c.location?.lat || 12.9716),
                                                            (c.location?.lng || 77.5946),
                                                            targetUnit
                                                        );

                    if (predictedPath && predictedPath.length > 1) {
                        activePolylines[caseId] = L.polyline(predictedPath, {
                            color: '#eab308',
                            weight: 4,
                            opacity: 0.8,
                            dashArray: '10, 15'
                        }).addTo(map);

                        map.fitBounds(predictedPath, {
                            padding: [120, 120],
                            maxZoom: 17
                        });
                    }
                    activePolylines[caseId] = L.polyline(predictedPath, { color: '#eab308', weight: 4, opacity: 0.8, dashArray: '10, 15', className: 'tracking-line' }).addTo(map);
                } else if (c.status === 'dispatched' && c.routePath) {

    let color = c.unit === 'HELI' ? '#a855f7' : '#22c55e';

    const route = c.routePath; // ✅ use directly
    console.log("ROUTE:", c.routePath);

    // 🔥 DRAW ROUTE
    activePolylines[caseId] = L.polyline(route, {
        color: color,
        weight: 5,
        opacity: 0.95
    }).addTo(map);

    // 🔥 ZOOM TO ROUTE (THIS WAS MISSING)
    if (route.length > 1) {
        map.fitBounds(route, {
            padding: [120, 120],
            maxZoom: 17
        });
    }

    // 🔥 bring ambulance forward
    if (vehicleMarkers[caseId]) {
        vehicleMarkers[caseId].bringToFront();
    }
}
            }, 100);
        }

        setInterval(() => {
            let uiNeedsUpdate = false;
            globalCases.forEach(c => {
                if (c.status === 'dispatched' && c.currentEta > 0) {
                    c.currentEta--;
                    const m = Math.floor(c.currentEta / 60); const s = c.currentEta % 60;
                    const timeString = `0${m}:${s < 10 ? '0'+s : s}`;

                    const etaText = document.getElementById(`eta-text-${c.case_id}`);
                    const etaBar = document.getElementById(`eta-bar-${c.case_id}`);
                    if (etaText && etaBar) { etaText.innerText = timeString; etaBar.style.width = `${100 - ((c.currentEta / c.totalEta) * 100)}%`; }

                    if (vehicleMarkers[c.case_id] && vehicleMarkers[c.case_id].isPopupOpen()) {
                        vehicleMarkers[c.case_id].setPopupContent(`
                            <div class="font-bold text-gray-900 text-xs">
                                Unit: ${c.unit}<br>
                                Case: ${c.case_id}<br>
                                ETA: <span class="text-green-600">${timeString}</span>
                            </div>
                        `);
}

                    if (c.currentEta <= 0) {
                        c.status = 'reached';
                        if(activePolylines[c.case_id]) { map.removeLayer(activePolylines[c.case_id]); delete activePolylines[c.case_id]; }
                        if(vehicleMarkers[c.case_id]) { map.removeLayer(vehicleMarkers[c.case_id]); delete vehicleMarkers[c.case_id]; }
                        addLog(`[ON-SITE] ${c.assigned_unit || c.unit || "AMB"} successfully secured ${c.case_id}.`, "success");
                        uiNeedsUpdate = true;
                    }
                }
            });
            if (uiNeedsUpdate) { renderDashboard(); }
        }, 500);

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            renderDashboard();
        }

        function drawStations() {
            STATIONS.forEach(s => {
                const heliBadge = s.heli > 0 ? `<span class="text-purple-400 font-bold ml-1">🚁${s.heli}</span>` : '';
                const icon = L.divIcon({
                    className: 'leaflet-transparent-icon',
                    html: `<div class="bg-gray-900/90 backdrop-blur-sm border border-gray-600 rounded p-1 text-[8px] text-center min-w-[50px] shadow-2xl transition-all hover:scale-110">
                        <div class="font-bold border-b border-gray-700 mb-1">${s.name.toUpperCase()}</div>
                        <div class="flex justify-center gap-1"><span class="text-red-500">🚒${s.fire}</span><span class="text-blue-400">🚑${s.med}</span>${heliBadge}</div>
                    </div>`,
                    iconSize: [60, 35]
                });
                if(!stationMarkers[s.id]) stationMarkers[s.id] = L.marker([s.lat, s.lng], {icon}).addTo(map);
            });
        }

        function renderDashboard() {
            const list = document.getElementById('case-list');
            list.innerHTML = '';
            const filtered = globalCases.filter(c => c.status === currentTab);
            
            document.getElementById('count-pending').innerText = globalCases.filter(c => c.status === 'pending').length;
            document.getElementById('count-dispatched').innerText = globalCases.filter(c => c.status === 'dispatched').length;
            document.getElementById('count-reached').innerText = globalCases.filter(c => c.status === 'reached').length;

            filtered.sort((a,b) => getSeverityWeight(b.severity || b.processed?.severity) - getSeverityWeight(a.severity || a.processed?.severity));

            filtered.forEach(c => {
                console.log("FINAL CHECK:", {
                case: c.case_id,
                origin_lat: c.origin_lat,
                origin_lng: c.origin_lng,
                routePath: c.routePath
            });
               const sev = c.severity || c.processed?.severity;
               const col = getSeverityColor(sev);
                const rawText = (c.input && c.input.raw_text) ? c.input.raw_text : "Emergency Reported";
                
                const card = document.createElement('div');
                card.id = `card-${c.case_id}`;
                card.className = `case-card p-4 rounded bg-gray-900 border-l-4 cursor-pointer transition-all hover:bg-gray-800 ${sev === 'CRITICAL' ? 'border-red-500' : sev === 'HIGH' ? 'border-orange-500' : 'border-blue-500'}`;
                let actions = '';
                
                // Ensure a confidence score exists for display
                if(!c.confidenceScore) c.confidenceScore = Math.floor((c.confidence || 0.8) * 100); // 88% - 99%
                
                // NEW: REALLOCATION VISIBILITY BADGES
                let reallocatedBadge = '';
                if (c.origin && (c.origin.includes('DIVERT') || c.origin.includes('RE-ROUTED'))) {
                    reallocatedBadge = `<span class="bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded font-bold tracking-wider animate-pulse border border-red-400 shadow-[0_0_5px_rgba(220,38,38,0.8)] ml-2">⚠️ REALLOCATED</span>`;
                }

                if (c.diverted && c.status === 'pending') {
                    actions += `<div class="bg-red-900/50 border border-red-500 text-red-200 text-[9px] p-1.5 mb-2 rounded font-bold uppercase tracking-wider animate-pulse">⚠️ INITIAL UNIT DIVERTED. AWAITING BACKUP DISPATCH.</div>`;
                }

                if(c.status === 'pending') {
                    const recs = analyzeSignals(rawText, sev); let buttonsHtml = '';
                    recs.forEach(rec => { buttonsHtml += `<button onclick="event.stopPropagation(); handleDispatch('${c.case_id}','${rec.type}',${(c.location?.lat || 12.9716)},${(c.location?.lng || 77.5946)})" class="flex-1 ${rec.btnClass} text-white py-2 rounded text-[9px] font-bold shadow-lg transition-colors border">${rec.icon} DISPATCH ${rec.label}</button>`; });
                    actions += `<div class="mt-4 flex gap-2 flex-wrap">${buttonsHtml}</div>`;
                } else if (c.status === 'dispatched') {
                    const pct = c.totalEta > 0 ? 100 - ((c.currentEta / c.totalEta) * 100) : 0;
                    const m = Math.floor(c.currentEta / 60); const s = c.currentEta % 60;
                    const timeString = `0${m}:${s < 10 ? '0'+s : s}`;

                    // NEW: FIXED ASSIGNED UNIT DISPLAY
                    let cleanOrigin = (c.origin || "Unknown")
    .replace(' (MID-ROUTE DIVERT)', '')
    .replace(' (BACKUP RE-ROUTED)', '');
                    
                    actions = `<div class="mt-3 bg-gray-800/80 p-2 rounded border border-gray-700 shadow-inner">
    <div class="flex justify-between items-center mb-1.5">
        <p class="text-[10px] text-orange-400 font-bold uppercase flex items-center gap-1.5">
            <span class="w-2 h-2 bg-orange-500 rounded-full animate-pulse shadow-[0_0_8px_#f97316]"></span> 
            📡 Tracking ${c.assigned_unit || c.unit || "AMB"}
        </p>
        <div class="bg-black/50 px-1.5 py-0.5 rounded flex items-center gap-1 border border-green-500/30">
            <span class="text-[8px] text-gray-400">ETA</span>
            <span id="eta-text-${c.case_id}" class="text-[10px] text-green-400 font-mono font-bold animate-pulse">
                ${timeString || "02:00"}
            </span>
        </div>
    </div>

    <div class="text-[9px] text-gray-400 mb-2 truncate">
        Unit: <span class="text-white font-bold">${(c.assigned_unit || c.unit || "AMB")}_Alpha</span> • 
        Origin: <span class="text-white">${cleanOrigin || "Unknown"}</span>
    </div>

    <div class="w-full h-1.5 bg-gray-900 rounded-full overflow-hidden relative border border-gray-700">
        <div id="eta-bar-${c.case_id}" class="absolute top-0 left-0 h-full bg-orange-500 transition-all duration-1000 ease-linear" 
             style="width: ${pct || 0}%"></div>
    </div>
</div>`;
                } else {
                    actions = `<p class="mt-3 text-[10px] text-green-500 font-bold uppercase tracking-widest">✅ Secured On-Site</p>`;
                }

                card.innerHTML = `<div class="flex justify-between mb-2">
                    <div class="flex items-center">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold ${sev === 'CRITICAL' ? 'bg-red-900 text-red-200' : 'bg-blue-900 text-blue-200'}">${sev}</span>
                        ${reallocatedBadge}
                    </div>
                    <span class="text-[9px] text-gray-500 font-mono">${c.case_id} • Conf: ${c.confidenceScore}%</span>
                </div>
                <p class="text-sm font-medium text-gray-200">${rawText}</p>${actions}`;
                
                card.onclick = () =>  highlightSidebarCard(c.case_id); 
                list.appendChild(card);

                if(!activeMarkers[c.case_id]) {
                    const iconHTML = sev === 'CRITICAL' ? `<div class="pulse-dot"></div>` : `<div class="standard-dot" style="background:${col}"></div>`;
                    const m = L.marker([(c.location?.lat || 12.9716), (c.location?.lng || 77.5946)], { icon: L.divIcon({ className: 'leaflet-transparent-icon', html: iconHTML, iconAnchor:[11,11]})}).addTo(map);
                    m.bindPopup(`<div class="text-gray-900 font-bold text-xs">${sev}: ${c.case_id}</div>`);
                    m.on('click', () => { highlightSidebarCard(c.case_id); });
                    activeMarkers[c.case_id] = m;
                }
                // 🔥 AMBULANCE MARKER (ADD THIS RIGHT AFTER case marker block)
if (c.origin_lat && c.origin_lng) {

    if (!vehicleMarkers[c.case_id]) {
        vehicleMarkers[c.case_id] = L.marker(
            [c.origin_lat, c.origin_lng],
            {
                icon: L.divIcon({
                    className: 'leaflet-transparent-icon',
                    html: '<div style="font-size:18px;">🚑</div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                })
            }
        ).addTo(map);
    }
}
            });
        }

        function dispatchCase(caseId) {
    if (simulationState[caseId]) return;

    simulationState[caseId] = {
        currentEta: 120,
        totalEta: 120,
        origin: "STATION_" + Math.floor(Math.random() * 5)
    };

    const interval = setInterval(() => {
    const sim = simulationState[caseId];
    if (!sim) return;

    sim.currentEta -= 1;

    // 🔥 ADD MOVEMENT LOGIC HERE
    const c = globalCases.find(x => x.case_id === caseId);

    if (c && c.routePath && c.routePath.length > 1 && vehicleMarkers[caseId]) {

        const route = c.routePath;

        // progress (0 → 1)
        let progress = 1 - (sim.currentEta / sim.totalEta);

        const totalSegments = route.length - 1;
        const exactIndex = progress * totalSegments;

        const i = Math.floor(exactIndex);
        const t = exactIndex - i;

        const start = route[i];
        const end = route[i + 1] || route[i];

        const lat = start[0] + (end[0] - start[0]) * t;
        const lng = start[1] + (end[1] - start[1]) * t;

        vehicleMarkers[caseId].setLatLng([lat, lng]);
    }

    // 🔥 END FIX

    if (sim.currentEta <= 0) {
    sim.currentEta = 0;
    clearInterval(interval);

    // 🔥 UPDATE STATUS LOCALLY
    const c = globalCases.find(x => x.case_id === caseId);
    if (c) {
        c.status = "on_site";
    }

    // 🔥 OPTIONAL: log it
    console.log("Ambulance reached:", caseId);

    renderDashboard();  // refresh UI immediately
}

    

}, 1000);
}

       async function fetchLiveCases() {
    try {
        const res = await fetch(`${API_BASE_URL}/cases`);
        const data = await res.json();

        console.log("DATA FULL:", JSON.stringify(data, null, 2));

        globalCases = data.map(c => {
            const sim = simulationState[c.case_id];

            return {
                ...c,

                // ✅ STATUS FIX
                status:
                    c.status === "assigned" ? "dispatched" :
                    c.status === "waiting" ? "pending" :
                    c.status === "completed" ? "reached" :
                    c.status === "on_site" ? "reached" :
                    c.status,

                // ✅ KEEP SIMULATION STATE
                currentEta: sim ? sim.currentEta : (c.currentEta || 0),
                totalEta: sim ? sim.totalEta : (c.totalEta || 0),

                // ✅ IMPORTANT FIELDS (backend → frontend)
                routePath: c.routePath,
                origin_lat: c.origin_lat,
                origin_lng: c.origin_lng,
                assigned_unit: c.assigned_unit,

                // ✅ FIXED ORIGIN DISPLAY
                origin: (c.origin_lat && c.origin_lng)
                    ? `(${c.origin_lat.toFixed(3)}, ${c.origin_lng.toFixed(3)})`
                    : "Unknown"
            };
        });

        document.getElementById('api-status').innerText = "LIVE 🟢";

        if (systemLogs.length === 0) {
            addLog("Connected to backend. Live data streaming.", "success");
        }

        // 🔥 AUTO START SIMULATION
        globalCases.forEach(c => {
            if (c.status === "dispatched" && !simulationState[c.case_id]) {
                dispatchCase(c.case_id);
            }
        });

    } catch(e) { 
        console.error("FETCH ERROR:", e);

        document.getElementById('api-status').innerText = "OFFLINE 🔴";
        addLog("DB Connection Failed. Running in Offline Mock Mode.", "alert");
    }

    // 🔥 CRITICAL: always re-render UI
    renderDashboard();
}

renderDashboard();

function highlightSidebarCard(caseId) {
    const c = globalCases.find(x => x.case_id === caseId);
    if (!c) return;

    // 🔥 remove old routes
    for (let id in activePolylines) {
        map.removeLayer(activePolylines[id]);
    }
    activePolylines = {};

    // 🔥 use route directly (NO conversion)
    if (c.routePath && c.routePath.length > 1) {

        const route = c.routePath; // ✅ already correct format

        activePolylines[caseId] = L.polyline(route, {
            color: '#22c55e',
            weight: 5,
            opacity: 0.95
        }).addTo(map);

        map.fitBounds(route, {
            padding: [120, 120],
            maxZoom: 17
        });

    } else {
        map.setView([c.location.lat, c.location.lng], 16);
    }

    // 🔥 bring ambulance marker to front
    if (vehicleMarkers[caseId]) {
        vehicleMarkers[caseId].bringToFront();
    }
}

// 🔥 SAFE DISPATCH TRIGGER (runs after render, not tied to fetch timing)
requestAnimationFrame(() => {
    globalCases.forEach(c => {
        if (c.status === "dispatched" && !startedSimulations.has(c.case_id)) {
            startedSimulations.add(c.case_id);

            try {
                dispatchCase(c.case_id);
            } catch (err) {
                console.error("Dispatch error:", err);
            }
        }
    });
});

    

    if (isFirstLoad) {
    drawStations();

    // 🔥 SAFE CHECK BEFORE fitBounds
    const validPoints = globalCases
        .map(x => [x.location?.lat, x.location?.lng])
        .filter(p => p[0] && p[1]);

    if (validPoints.length > 0) {
        map.fitBounds(validPoints, {
            padding: [80, 80],
            maxZoom: 15
        });
    }

    isFirstLoad = false;
}

fetchLiveCases(); 
setInterval(fetchLiveCases, 3000);


    </script>
